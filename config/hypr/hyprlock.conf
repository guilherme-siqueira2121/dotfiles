general {
    grace = 0
}

background {
    monitor =
    path = $HOME/dotfiles/wallpapers/current/wall.jpg
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 280, 32
    outline_thickness = 1
    hide_input = true
    dots_size = 0.25
    dots_spacing = 0.55
    dots_center = true
    position = 0, -80
    halign = center
    valign = center
    inner_color = rgba(255,255,255,0.08)
    outer_color = rgba(255,255,255,0.04)
    outline_color = rgba(200,200,200,0.5)
    font_color = rgba(240,240,240,0.9)
    font_family = JetBrains Mono Nerd Font
    fail_text = Senha incorreta ($ATTEMPTS)
    fail_color = rgba(180,60,60,0.7)
    fade_on_empty = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(240,240,240,0.85)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B")"
    color = rgba(200,200,200,0.65)
    font_size = 16
    font_family = JetBrains Mono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}