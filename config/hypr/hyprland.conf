# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,1600x900@60,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = wezterm 
$fileManager = dolphin
# $menu = rofi -show drun
$menu = vicinae toggle


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = waybar   
# exec-once = swaync
exec-once = mako
exec-once = waypaper --restore
exec-once = ~/.local/bin/battery_monitor.sh
exec-once = ~/.local/bin/bluetooth-auto-switch.sh
exec-once = wl-paste --watch cliphist store
exec-once = vicinae server
# exec-once = rofi -show drun

exec-once = swayidle -w \
    timeout 300 './smartlock.sh' \
    resume 'hyprctl dispatch dpms on' \
    before-sleep 'hyprlock'

#################
### AUTOSTART ###
#################

# Auto-open applications on specific workspaces
exec-once = [workspace 1 silent] firefox
exec-once = [workspace 2 silent] kitty
exec-once = [workspace 3 silent] zen
exec-once = [workspace special:magic silent] google-chrome


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_THEME,capitaine-cursors
env = XCURSOR_SIZE,16


###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# MacOS-Style Visual Enhancements
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 1
    col.active_border = rgba(ffffff20) rgba(0080ff30) 45deg    # Subtle gradient border
    col.inactive_border = rgba(ffffff08)                       # Very subtle inactive border
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    # no_gaps_when_only moved to newer Hyprland versions or doesn't exist
}

decoration {
    rounding = 12
    
    active_opacity = 0.98
    inactive_opacity = 0.85
    
    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(0, 0, 0, 0.8)     # Deeper shadow with more opacity
        offset = 0 8                   # Offset shadow downward for 3D effect
    }
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = false
        noise = 0.02
        contrast = 1.1
        brightness = 1.0
        vibrancy = 0.3
        vibrancy_darkness = 0.5
        popups = true
        popups_ignorealpha = 0.6
    }
    
    # Additional enhancement for better 3D effect
    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.4
    dim_around = 0.6
}

animations {
    enabled = yes

    # Bézier curves for smooth macOS-like animations
    bezier = macEase, 0.25, 1.0, 0.5, 1.0
    bezier = macPop, 0.2, 0.8, 0.4, 1.1
    bezier = macSmooth, 0.4, 0.0, 0.2, 1.0
    bezier = macBounce, 0.68, -0.55, 0.265, 1.55

    # ── Windows (styles allowed on the base key) ──
    animation = windows, 1, 4, macEase, popin 90%
    animation = windowsIn, 1, 3, macPop
    animation = windowsOut, 1, 3, macEase
    animation = windowsMove, 1, 3, macSmooth

    # ── Layers (style on base only) ──
    animation = layers, 1, 3, macSmooth, fade
    animation = layersIn, 1, 3, macEase
    animation = layersOut, 1, 3, macSmooth

    # ── Fade (no styles for these child entries) ──
    animation = fade, 1, 3, macSmooth
    animation = fadeIn, 1, 3, macSmooth
    animation = fadeOut, 1, 3, macSmooth
    animation = fadeSwitch, 1, 3, macEase
    animation = fadeShadow, 1, 3, macSmooth
    animation = fadeDim, 1, 3, macSmooth
    animation = fadeLayers, 1, 3, macSmooth

    # ── Borders ──
    animation = border, 1, 3, macEase
    animation = borderangle, 1, 10, macSmooth, loop

    # ── Workspaces & specialWorkspace (style on base only) ──
    animation = workspaces, 1, 4, macEase, slidefade 20%
    animation = workspacesIn, 1, 3, macEase
    animation = workspacesOut, 1, 3, macEase

    animation = specialWorkspace, 1, 4, macBounce, slidefadevert 15%
    animation = specialWorkspaceIn, 1, 3, macEase
    animation = specialWorkspaceOut, 1, 3, macEase
}


# Window Rules - Enhanced for macOS-like appearance

# === 🌄 Waypaper (Wallpaper Setter) ===
# Clean modal-style floating window
windowrulev = float, class:^(waypaper)$
windowrulev = center, class:^(waypaper)$
windowrulev = size 1100 750, class:^(waypaper)$
windowrulev = bordersize 0, class:^(waypaper)$
windowrulev = rounding 16, class:^(waypaper)$
windowrulev = opacity 0.95 0.9, class:^(waypaper)$
windowrulev = stayfocused, class:^(waypaper)$

# === 📂 File Manager (Nautilus, Thunar, Dolphin) ===
# Premium floating file browser
windowrulev = float, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$
windowrulev = center, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$
windowrulev = size 1300 850, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$
windowrulev = bordersize 1, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$
windowrulev = rounding 14, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$
windowrulev = opacity 0.96 0.88, class:^(org.gnome.Nautilus|Thunar|dolphin|pcmanfm)$

# === ⚙️ Settings Apps ===
# Modal settings dialogs
windowrulev = float, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = center, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = size 1100 750, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = bordersize 1, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = rounding 12, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = opacity 0.95 0.87, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$
windowrulev = stayfocused, class:^(gnome-control-center|lxappearance|pavucontrol|qt5ct|qt6ct)$

# === 💬 Chat / Messaging Apps ===
# Large communication windows with subtle styling
windowrulev = float, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$
windowrulev = center, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$
windowrulev = size 1400 900, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$
windowrulev = bordersize 1, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$
windowrulev = rounding 12, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$
windowrulev = opacity 0.97 0.89, class:^(discord|TelegramDesktop|slack|teams|whatsapp-for-linux)$

# === 🧮 Floating Terminal Popups ===
# Quick access terminal with premium styling
windowrulev = float, title:^(float-term|popup-term)$
windowrulev = center, title:^(float-term|popup-term)$
windowrulev = size 1100 650, title:^(float-term|popup-term)$
windowrulev = bordersize 1, title:^(float-term|popup-term)$
windowrulev = rounding 12, title:^(float-term|popup-term)$
windowrulev = opacity 0.94 0.86, title:^(float-term|popup-term)$

# === 🔧 System Utilities ===
# Calculator, system monitors, etc.
windowrulev = float, class:^(gnome-calculator|galculator|qalculate-gtk|htop|btop|nvtop)$
windowrulev = center, class:^(gnome-calculator|galculator|qalculate-gtk|htop|btop|nvtop)$
windowrulev = rounding 10, class:^(gnome-calculator|galculator|qalculate-gtk|htop|btop|nvtop)$
windowrulev = opacity 0.94 0.85, class:^(gnome-calculator|galculator|qalculate-gtk|htop|btop|nvtop)$
windowrulev = bordersize 1, class:^(gnome-calculator|galculator|qalculate-gtk|htop|btop|nvtop)$

# === 📷 Image/Media Viewers ===
# Floating media viewers with high opacity
windowrulev = float, class:^(eog|gwenview|feh|imv|mpv|vlc)$
windowrulev = center, class:^(eog|gwenview|feh|imv|mpv|vlc)$
windowrulev = rounding 10, class:^(eog|gwenview|feh|imv|mpv|vlc)$
windowrulev = opacity 0.98 0.92, class:^(eog|gwenview|feh|imv|mpv|vlc)$

# === 🚀 App Launchers & Menus ===
# Rofi, dmenu alternatives, and Vicinae
windowrulev = float, class:^(rofi|wofi|tofi|vicinae)$
windowrulev = center, class:^(rofi|wofi|tofi|vicinae)$
windowrulev = rounding 12, class:^(rofi|wofi|tofi|vicinae)$
windowrulev = opacity 0.93 0.85, class:^(rofi|wofi|tofi|vicinae)$
windowrulev = stayfocused, class:^(rofi|wofi|tofi|vicinae)$

# === 🎯 Special Window Behaviors ===
# Picture-in-picture for browsers
windowrulev = float, title:^(Picture-in-Picture|PiP)$
windowrulev = pin, title:^(Picture-in-Picture|PiP)$
windowrulev = rounding 8, title:^(Picture-in-Picture|PiP)$
windowrulev = opacity 0.98, title:^(Picture-in-Picture|PiP)$
windowrulev = size 480 270, title:^(Picture-in-Picture|PiP)$

# Splash screens and loading dialogs
windowrulev = float, class:^(\..*-wrapped)$
windowrulev = center, class:^(\..*-wrapped)$
windowrulev = rounding 12, class:^(\..*-wrapped)$
windowrulev = opacity 0.95, class:^(\..*-wrapped)$


# === 🪟 Dwindle Layout Configuration ===
# Automatic tiling layout - splits windows dynamically
dwindle {
    pseudotile = true                    # Allows floating-like behavior for tiled windows
    preserve_split = true                # Keeps your manual splits when moving windows
    smart_split = true                   # Makes new windows split in the most balanced way
    smart_resizing = true                # Automatically adjusts window sizes intelligently
    permanent_direction_override = false  # Allows more flexible window placement
    special_scale_factor = 0.95          # Scale factor for special workspaces (scratchpad)
    split_width_multiplier = 1.2         # Makes splits slightly wider for better proportions
    use_active_for_splits = true         # Uses active window as reference for new splits
    default_split_ratio = 1.2            # Default ratio for new splits (golden ratio-ish)
}

# === 👑 Master Layout Configuration ===
# Traditional master-stack layout (like i3/dwm)
master {
    new_status = master                  # New windows become master by default
    new_on_top = true                   # New master windows appear at top
    orientation = left                   # Master window on the left side
    smart_resizing = true               # Intelligent resizing behavior
    drop_at_cursor = false              # Don't drop windows at cursor position
    mfact = 0.5                         # Master window takes 50% of screen width
}

# === ⚡ Performance & Behavior Optimizations ===
misc {
    # === 🎨 Visual Settings ===
    force_default_wallpaper = 0         # Disable anime wallpapers completely
    disable_hyprland_logo = true        # Remove Hyprland logo from empty workspaces
    disable_splash_rendering = true     # Skip splash screen for faster startup
    
    # === 🚀 Performance Optimizations ===
    vfr = true                          # Variable refresh rate - saves power
    vrr = 2                             # Adaptive sync (0=off, 1=fullscreen, 2=always)
    mouse_move_enables_dpms = true      # Wake displays on mouse movement
    key_press_enables_dpms = true       # Wake displays on key press
    always_follow_on_dnd = true         # Follow drag-and-drop operations
    layers_hog_keyboard_focus = true    # Better keyboard focus management
    animate_manual_resizes = true       # Smooth animations when manually resizing
    animate_mouse_windowdragging = true # Smooth window dragging animations
    disable_autoreload = false          # Auto-reload config on changes (keep enabled)
    
    # === 🖱️ Focus & Window Management ===
    focus_on_activate = true            # Focus windows when they request activation
    mouse_move_focuses_monitor = true   # Focus follows mouse between monitors

    # === 🔧 Advanced Behavior ===
    allow_session_lock_restore = true   # Allow session restoration after lock
    background_color = 0x000000         # Fallback background color (black)
    close_special_on_empty = true       # Auto-close empty special workspaces
    initial_workspace_tracking = 1      # Track initial workspace for windows
    middle_click_paste = true           # Enable middle-click paste (Linux standard)
    
    # === 📱 Touch & Gesture Support ===
    enable_swallow = true               # Enable window swallowing (terminals)
    swallow_regex = ^(Alacritty|kitty|footclient|wezterm)$ # Which terminals can swallow
    swallow_exception_regex = ^(wev)$   # Applications that shouldn't be swallowed
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant =abnt2
    kb_model = abnt2
    kb_options =
    kb_rules =

    follow_mouse = 1
    mouse_refocus = false               # Don't refocus on mouse hover after clicking
    float_switch_override_focus = 2     # Focus follows mouse for floating windows

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat                # Consistent mouse sensitivity

    touchpad {
        natural_scroll = false          
        tap-to-click = true            # Tap to click
        tap-and-drag = true            # Drag with tap-hold
        drag_lock = true               # Lock drag until tap again
        disable_while_typing = true    # Prevent accidental touches
        middle_button_emulation = true  # Three-finger tap for middle click
        scroll_factor = 0.3            # Slower, more precise scrolling
    }

    numlock_by_default = true          # Enable numlock on startup
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # === 🖱️ Workspace Gestures ===
    gesture = 3, left, dispatcher, workspace, m-1   # Move to workspace minus 1
    gesture = 3, right, dispatcher, workspace, m+1  # Move to workspace plus 1
    
    # === 🪟 Window Management Gestures ===
    gesture = 3, up, fullscreen                     # 3-finger swipe up to fullscreen
    gesture = 3, down, close                        # 3-finger swipe down to close window
    
    # === ✨ Special Workspace Gestures ===
    gesture = 4, up, special, magic                 # 4-finger swipe up for special workspace
    gesture = 4, down, special, terminal            # 4-finger swipe down for terminal workspace
    gesture = 4, left, float                        # 4-finger swipe left to float window
    gesture = 4, right, move                        # 4-finger swipe right to move window
    
    # === 🔍 Pinch Gestures ===
    gesture = 3, pinchout, fullscreen               # 2-finger pinch out to fullscreen
    gesture = 3, pinchin, float                     # 2-finger pinch in to float
    
    # === 🎯 Advanced Gestures with Modifiers ===
    gesture = 5, up, mod: ALT, scale: 1.2, resize  # Alt + 5-finger up to resize (faster)
    gesture = 5, down, mod: SUPER, dispatcher, killactive  # Super + 5-finger down to kill
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "ALT" key as main modifier

# === 🚀 Application Launchers ===
bind = SUPER, return, exec, kitty
bind = SUPER, E, exec, dolphin
bind = $mainMod, D, exec, $menu
bind = SUPER, S, exec, grim -g "$(slurp)" - | wl-copy  # Screenshot
bind = SUPER, C, exec, ~/.local/bin/rofi-clipboard.sh   # Clipboard
bind = SUPER, L, exec, hyprlock                         # Lock screen

# === 🪟 Window Management ===
bind = SUPER, Q, killactive,
bind = SUPER, M, exit,
bind = $mainMod, V, togglefloating,
bind = SUPER, F, fullscreen, 
bind = $mainMod, P, pseudo,      # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# === 🧭 Focus Management ===
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + HJKL (vim-like)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# === 📱 Workspace Management ===
# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# === ✨ Special Workspaces (Scratchpad) ===
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Additional special workspaces for specific uses
bind = $mainMod, grave, togglespecialworkspace, terminal
bind = $mainMod SHIFT, grave, movetoworkspace, special:terminal

# === 🖱️ Mouse Controls ===
# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Window resizing mode (your original binding)
# bindm = $mainMod, W, resizewindow
bindm = $mainMod, W, cyclenext

# === 🔊 Media Controls ===
# Volume controls with notifications and sounds
bindel = ,XF86AudioRaiseVolume, exec, /home/rainz/.config/hypr/scripts/control.sh volume-up
bindel = ,XF86AudioLowerVolume, exec, /home/rainz/.config/hypr/scripts/control.sh volume-down
bindel = ,XF86AudioMute, exec, /home/rainz/.config/hypr/scripts/control.sh volume-mute

# Brightness controls with notifications
bindel = ,XF86MonBrightnessUp, exec, /home/rainz/.config/hypr/scripts/control.sh brightness-up
bindel = ,XF86MonBrightnessDown, exec, /home/rainz/.config/hypr/scripts/control.sh brightness-down

# Media player controls (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# === ⚡ Advanced Window Management ===
# Window resizing with keyboard
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# Move windows around
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Group windows (tabbed layout)
bind = $mainMod, G, togglegroup,
bind = $mainMod, tab, changegroupactive,

# Alt+Tab for window cycling (different from your mainMod+W)
bind = ALT, tab, cyclenext,
bind = ALT SHIFT, tab, cyclenext, prev


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Workspace rules for specific behavior
workspace = 1, default:true,
workspace = 2, on-created-empty:$terminal
workspace = 3
workspace = special:magic, on-created-empty:google-chrome
workspace = special:terminal, on-created-empty:$terminal

# Window rules for better productivity
windowrulev = workspace 1, class:^(brave)$
windowrulev = workspace 2, class:^(wezterm|Alacritty|kitty|footclient)$
windowrulev = workspace 3, class:^(zen)$
windowrulev = workspace special:magic, class:^(google-chrome)$
windowrulev = workspace 4, class:^(discord|telegram|slack)$
