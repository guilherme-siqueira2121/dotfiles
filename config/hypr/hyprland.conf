################
### MONITORS ###
################

monitor=,1600x900@60,0x0,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = yazi
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = mako
exec-once = awww-daemon
exec-once = sleep 1 && awww img $HOME/dotfiles/wallpapers/current/wall.jpg --transition-type none
exec-once = awww img $HOME/dotfiles/wallpapers/current/wall.jpg
exec-once = wl-paste --watch cliphist store

exec-once = [workspace 1 silent] firefox
exec-once = [workspace 2 silent] kitty

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,capitaine-cursors
env = XCURSOR_SIZE,16
env = EDITOR,nvim

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(ffffff25)
    col.inactive_border = rgba(ffffff08)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10

    active_opacity = 0.97
    inactive_opacity = 0.87

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0,0,0,0.6)
        offset = 0 6
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        noise = 0.02
    }

    dim_inactive = true
    dim_strength = 0.08
}

animations {
    enabled = yes

    bezier = ease, 0.25, 1.0, 0.5, 1.0
    bezier = smooth, 0.4, 0.0, 0.2, 1.0

    animation = windows, 1, 4, ease, popin 90%
    animation = windowsOut, 1, 3, ease
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 4, ease, slidefade 20%
    animation = specialWorkspace, 1, 4, ease, slidefadevert 15%
    animation = border, 1, 3, ease
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

#############
### INPUT ###
#############

input {
    kb_layout = br
    kb_variant = abnt2
    kb_model = abnt2

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.3
    }

    numlock_by_default = true
}

####################
### WINDOW RULES ###
####################

# Float comum
windowrulev = float, class:^(pavucontrol|blueman-manager|nm-connection-editor)$
windowrulev = center, class:^(pavucontrol|blueman-manager|nm-connection-editor)$
windowrulev = size 700 500, class:^(pavucontrol|blueman-manager|nm-connection-editor)$

# Picture-in-Picture
windowrulev = float, title:^(Picture-in-Picture)$
windowrulev = pin, title:^(Picture-in-Picture)$
windowrulev = size 480 270, title:^(Picture-in-Picture)$

# Workspaces
windowrulev = workspace 1, class:^(firefox|brave)$
windowrulev = workspace 2, class:^(kitty|wezterm|Alacritty)$

###################
### KEYBINDINGS ###
###################

$mainMod = ALT

# Aplicações
bind = SUPER, return, exec, $terminal
bind = SUPER, E, exec, $terminal -e yazi
bind = $mainMod, D, exec, $menu
bind = SUPER, S, exec, grim -g "$(slurp)" - | wl-copy
bind = SUPER, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = SUPER, L, exec, hyprlock

# Janelas
bind = SUPER, Q, killactive,
bind = $mainMod, V, togglefloating,
bind = SUPER, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Foco (setas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Foco (vim)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Redimensionar
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50

# Mover janelas
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Mídia
bindel = ,XF86AudioRaiseVolume, exec, pamixer --allow-boost -i 5
bindel = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindel = ,XF86AudioMute, exec, pamixer -t
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

# Wallpaper
bind = SUPER, W, exec, $HOME/dotfiles/bin/change-wall.sh

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1, default:true
workspace = 2, on-created-empty:$terminal
workspace = special:magic, on-created-empty:kitty