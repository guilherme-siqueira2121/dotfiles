# Fonte (você pode alterar aqui se quiser)
font_size 12

# Padding
window_padding_width  8
window_margin_width   0

# Performance
repaint_delay 10
input_delay 1
sync_to_monitor yes
enable_audio_bell no

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 10000

# Hyperlinks
allow_hyperlinks yes

# Symbols
symbol_map U+E0B0-U+E0B3 Cascadia Code NF

# Shell padrão
shell /bin/fish

# Window layout
remember_window_size yes
initial_window_width 120
initial_window_height 30

# Keyboard (atalhos fixos)
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+enter new_window
map ctrl+shift+j next_window
map ctrl+shift+k previous_window
map ctrl+shift+f move_window_forward
map ctrl+shift+b move_window_backward

# Melhorias visuais fixas
enable_undercurl yes
term xterm-kitty

# Desempenho
dynamic_background_opacity yes
background_tint 0.1
